name: Backend E2E Integration Tests

on:
  pull_request:
  workflow_dispatch:

jobs:
  e2e-integration:
    name: Run backend integration suite
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: gochujang
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d gochujang"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: backend

    env:
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_NAME: gochujang
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_SSL: disable
      JWT_SECRET: ci-integration-secret-32-characters-min

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Run backend integration tests
        run: go test -tags=integration ./internal/server -v
