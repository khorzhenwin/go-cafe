services:
  go-cafe-frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
